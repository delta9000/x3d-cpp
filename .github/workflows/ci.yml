# CI for x3d-cpp-gen — the merge gate behind "Definition of Done".
#
# On every PR (and manual dispatch) the FAST, hermetic gates run as required
# checks: pytest, golden drift, conformance-view drift, wiki strict build, and a
# single-compiler C++ build + ctest.
#
# The per-seam backend swap-tests fall into two groups:
#   - **texture-swap** runs on every C++ PR — both decoders are vendored and the
#     gate is hermetic + <2 min. Byte-equal decode parity is the
#     closest thing the SDK has to a render-correctness guarantee, so it runs
#     every time.
#   - The remaining four swap-tests (quickjs / assetresolver / audio /
#     fontmetrics) each fetch+build a third-party backend (and assetresolver
#     also brings up docker/minio + the AWS SDK), so they run ONLY when their
#     backend, the seam interface header, the build system, or a CONSUMING
#     subsystem changed — gated by the `changes` job's path classifier
#     (manual dispatch runs them all).
#
# A `concurrency` group cancels superseded in-flight runs so rapid pushes to a
# PR don't each pay full freight.
#
# The 4-compiler baseline matrix is expensive, so it stays manual
# (workflow_dispatch) — run it before a release or when touching the build.
#
# NOTE: the five swap-test job names may be branch-protection "required" checks.
# A path-skipped job reports the "skipped" conclusion, which GitHub treats as
# passing — so PRs that don't touch a path-gated seam are not blocked waiting
# on it. (texture-swap is never skipped.)
#
# See docs/wiki/guides/card-to-done-workflow.md (the DoD gate) and
# docs/wiki/guides/gate-system.md (what each gate protects).
#
# Note: Forgejo Actions also reads .github/workflows, so mirroring picks up the
# same pipeline (apt-based, no GitHub-only actions beyond checkout + setup-uv).
name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs: a new push to the same PR cancels the in-flight run
# instead of paying for both. Keyed on the workflow + ref (PR merge ref), so
# distinct PRs never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which seam subsystems a PR touches so the heavy backend swap-tests run
  # ONLY when their backend, the seam interface, the build system, OR a
  # consuming subsystem changed. Python/golden/conformance/wiki always run;
  # C++ jobs use the classifier's `cpp` output. Plain git + Python 3 (no
  # third-party action) keeps the Forgejo mirror compatible. On manual dispatch
  # every class is requested.
  changes:
    name: detect changed subsystems
    runs-on: ubuntu-latest
    outputs:
      audio: ${{ steps.f.outputs.audio }}
      quickjs: ${{ steps.f.outputs.quickjs }}
      assets: ${{ steps.f.outputs.assets }}
      fontmetrics: ${{ steps.f.outputs.fontmetrics }}
      cpp: ${{ steps.f.outputs.cpp }}
      generator: ${{ steps.f.outputs.generator }}
      docs: ${{ steps.f.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ]; then
            python3 scripts/classify_ci_changes.py --all >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --prune origin "$BASE"
          base_sha="$(git merge-base HEAD "origin/$BASE")"
          changed="$(git diff --name-only "$base_sha" HEAD)"
          echo "changed vs $BASE ($base_sha):"; echo "$changed"
          printf '%s\n' "$changed" | python3 scripts/classify_ci_changes.py >> "$GITHUB_OUTPUT"

  python:
    name: pytest (unit + golden tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The golden tree is byte-exact, so the formatter version is part of the
      # contract. apt ships whatever Ubuntu currently has (18.x); install the
      # exact pin from mise.toml instead, so CI and local cannot diverge.
      - name: Install pinned clang-format (golden formatting is byte-exact)
        uses: jdx/mise-action@v2
        with:
          install_args: clang-format
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (incl dev group)
        run: uv sync
      - name: Run pytest
        run: uv run pytest

  golden:
    name: golden drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Must be the exact formatter that produced the golden tree. check_golden.sh
      # asserts the version and fails loudly on a mismatch rather than reporting
      # a toolchain difference as codegen drift.
      - name: Install pinned clang-format (must match the formatter that produced golden)
        uses: jdx/mise-action@v2
        with:
          install_args: clang-format
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync
      - name: Check golden tree (regenerate + diff *.hpp/*.cpp)
        run: ./scripts/check_golden.sh

  conformance:
    name: conformance-view gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Fails if findings.yaml schema is invalid or the committed generated view
      # (INDEX.md / model.json / components/) drifted from findings.yaml.
      - name: Check conformance view (schema + drift)
        run: uv run python scripts/conformance_view.py check

  docs:
    name: wiki strict build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # --strict fails on broken internal links / nav orphans.
      - name: Build wiki (strict)
        run: uv run --group docs mkdocs build --strict

  cpp:
    name: C++ build + ctest (gcc, PR fast gate)
    needs: changes
    # If this display name is configured as a required branch-protection check,
    # confirm the host accepts path-skipped jobs before enabling that requirement.
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-behavior-${{ github.sha }}
          restore-keys: ccache-behavior-
      - name: Bound ccache storage
        run: ccache --max-size=750M
      # X3D_CPP_WERROR=ON mirrors the local ci preset: warnings become errors,
      # so a latent warning introduced in a PR fails the merge gate here.
      - name: Configure
        run: cmake --preset ci
      - name: Build behavior targets
        run: cmake --build --preset ci --target x3d_behavior_tests
      - name: Test behavior suite
        run: ctest --preset ci -L behavior --output-on-failure -j "$(nproc)"

  # Compile-only public-header and installed-consumer contracts are isolated
  # from the fast runtime gate so their one-TU-per-header cost can run in
  # parallel and cannot inflate the behavior critical path.
  cpp-headers:
    name: C++ header compile contracts (gcc, PR gate)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-headers-${{ github.sha }}
          restore-keys: ccache-headers-
      - name: Bound ccache storage
        run: ccache --max-size=750M
      - name: Configure
        run: cmake --preset ci
      - name: Build compile contracts
        run: cmake --build --preset ci --target x3d_compile_contracts
      - name: Test compile contracts
        run: ctest --preset ci -L compile-contract --output-on-failure -j "$(nproc)"

  # Sanitizer gate (BLD-2). Builds the behavior suite in Debug with ASan + UBSan
  # (-fno-sanitize-recover=all, so the first error aborts). Compile contracts,
  # examples, fuzzers, and external-corpus gates do not execute useful sanitizer
  # behavior and stay out of this graph. Mirrors `mise run build-san` exactly via
  # the `san` preset; its separate build dir cannot share objects with `cpp`.
  cpp-san:
    name: C++ sanitizer gate (ASan + UBSan)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-san-${{ github.sha }}
          restore-keys: ccache-san-
      - name: Bound ccache storage
        run: ccache --max-size=750M
      - name: Configure (ASan + UBSan via the `san` preset)
        run: cmake --preset san
      - name: Build (sanitized)
        run: cmake --build --preset san --target x3d_sanitizer_tests
      - name: Test (behavior suite under ASan + UBSan)
        run: ctest --preset san -L behavior --output-on-failure -j "$(nproc)"

  # Fuzz gate (BLD-2). Builds the libFuzzer harness for sdk::parseDocument.
  # Clang instruments the compiled node/runtime layers with fuzzer-no-link
  # coverage + ASan/UBSan; the harness owns the libFuzzer driver.
  # A crash, leak, or UB found in the time budget fails the job (libFuzzer exits
  # nonzero). This is regression coverage, not an exhaustive campaign — the bound
  # keeps PR cost low while still re-exercising the parser against mutated input.
  cpp-fuzz:
    name: C++ fuzz gate (libFuzzer parseDocument)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache clang
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-fuzz-${{ github.sha }}
          restore-keys: ccache-fuzz-
      - name: Configure + build the libFuzzer harness (`fuzz` preset)
        run: |
          cmake --preset fuzz
          cmake --build --preset fuzz --target x3d_parse_fuzz
      # Bounded smoke: 60s of coverage-guided mutation. libFuzzer returns nonzero
      # (and writes a crash-<hash> reproducer) on any ASan/UBSan finding, failing
      # the gate. -print_final_stats surfaces coverage/exec counts in the log.
      - name: Fuzz (bounded 60s smoke)
        run: ./build-fuzz/x3d_parse_fuzz -max_total_time=60 -print_final_stats=1

  # Genericity proof — the permanent gate for the ScriptEngine seam (ADR-0022).
  # Builds the flag-gated QuickJS backend (FetchContents quickjs-ng v0.15.1) and runs
  # the dual-backend swap-test: identical fixtures through Duktape AND QuickJS must
  # produce identical observable behavior. Off the fast `cpp` job (extra fetch+build)
  # but on every PR, so a future change that breaks parity fails the merge.
  quickjs-swap:
    name: QuickJS seam swap-test
    needs: changes
    if: needs.changes.outputs.quickjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-quickjs-${{ github.sha }}
          restore-keys: ccache-quickjs-
      - name: Configure (QuickJS backend ON — FetchContents quickjs-ng)
        run: cmake -S . -B build -G Ninja -DX3D_CPP_BUILD_QUICKJS=ON
      # Build only the QuickJS swap-test targets — not the whole project. The
      # `cpp` job covers the full build/ctest; this gate exists to prove the
      # ScriptEngine seam, so building the rest here is wasted minutes.
      - name: Build (QuickJS swap-test targets only)
        run: cmake --build build --target x3d_quickjs_backend_test x3d_quickjs_swap
      - name: Swap-test (Duktape vs QuickJS observable parity)
        run: ctest --test-dir build --output-on-failure -R 'x3d_quickjs(_backend|_swap)'

  # Genericity proof — the permanent gate for the AssetResolver/IO seam (ADR-0023).
  # Builds the flag-gated libcurl HTTP + AWS S3 SDK backends and runs the
  # dual-backend swap-test against a docker minio service: identical fixture
  # bytes served through Backend A (libcurl HTTP) and Backend B (AWS S3 SDK)
  # must yield byte-equal AssetResult.bytes. Off the fast `cpp` job (extra
  # SDK install + docker service) but on every PR, so a future change that
  # breaks parity fails the merge.
  assetresolver-swap:
    name: AssetResolver seam swap-test
    needs: changes
    if: needs.changes.outputs.assets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # minio can't run as a `services:` container: the GH Actions service syntax
      # has no way to pass the container COMMAND, but `minio/minio` needs
      # `server /data` to start (with no command it prints usage and exits, so
      # the health-check never goes green and the job aborts at "Initialize
      # containers"). Start it as a plain docker step instead, where we control
      # the command, then poll its health endpoint before the swap-test runs.
      - name: Start minio (S3 fixture backend for the swap-test)
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ':9001'
          # Wait up to ~30s for minio to report live before continuing.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live; then
              echo "minio is live"; exit 0
            fi
            echo "waiting for minio to come up ($i/30)..."; sleep 1
          done
          echo "minio did not become healthy in time"; docker logs minio; exit 1
      - name: Install build tools (compiler, cmake, ninja, ccache, vcpkg deps)
        run: |
          sudo apt-get update
          # Both backend libs come from vcpkg below (libcurl for Backend A, the
          # AWS C++ SDK for Backend B), so no -dev packages from apt. From apt we
          # only need: the toolchain, and curl/zip/unzip/tar/pkg-config as
          # vcpkg's build prerequisites (the curl CLI also drives the minio
          # health check above).
          sudo apt-get install -y cmake ninja-build ccache g++ mold \
            curl zip unzip tar pkg-config
      # The AWS C++ SDK has no stock apt package, so install it via vcpkg.
      # GitHub-hosted runners ship vcpkg at $VCPKG_INSTALLATION_ROOT; fall back
      # to a shallow clone + bootstrap (e.g. on Forgejo Actions mirrors).
      - name: Locate or bootstrap vcpkg
        run: |
          if [ -n "$VCPKG_INSTALLATION_ROOT" ] && [ -x "$VCPKG_INSTALLATION_ROOT/vcpkg" ]; then
            echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          else
            git clone --depth 1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
            echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          fi
      # Binary cache so the heavy aws-sdk-cpp build (+ curl/openssl deps) is
      # built once and restored on later runs. Restored before `vcpkg install`.
      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          # Encode the manifest baseline in the key so it self-refreshes when the
          # baseline (or declared deps) change (a fixed key is immutable — it would
          # never pick up a new build). The prefix restore-keys still warm-restore
          # the unchanged archives (openssl/curl/aws-c-*/zlib), so only changed
          # ports rebuild. Bump alongside the vcpkg.json baseline.
          key: vcpkg-${{ runner.os }}-manifest-01f602195983451bc83e72f4214af2cbc495aa94
          restore-keys: vcpkg-${{ runner.os }}-
      - name: "Install backend deps (vcpkg.json manifest: curl + aws-sdk-cpp)"
        # Manifest mode (vcpkg.json in repo root, builtin-baseline pinned) installs
        # exactly the ports declared for this job — for the assetresolver swap,
        # that's curl and aws-sdk-cpp[core,s3]. The `[core,s3]` features on
        # aws-sdk-cpp suppress unused sub-clients (dynamodb, kinesis) and keep the
        # cold build tight.
        run: '"$VCPKG_ROOT/vcpkg" install --triplet x64-linux'
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-assetresolver-${{ github.sha }}
          restore-keys: ccache-assetresolver-
      - name: Configure (libcurl + S3 backends ON)
        run: |
          cmake -S . -B build -G Ninja \
            -DX3D_CPP_BUILD_CURL=ON -DX3D_CPP_BUILD_S3=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux
      # Build only what the swap-test needs — not the whole project (~40
      # unrelated test exes + examples). The `cpp` job already covers the full
      # build/ctest; this gate exists to prove the seam, so building the rest
      # here is wasted minutes.
      - name: Build (AssetResolver swap-test targets only)
        run: |
          cmake --build build --target \
            x3d_assetresolver_backend_a_test \
            x3d_assetresolver_backend_b_test \
            x3d_assetresolver_swap
      - name: Swap-test (libcurl HTTP vs AWS S3 observable parity)
        env:
          X3D_S3_ENDPOINT: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: ctest --test-dir build --output-on-failure -R 'x3d_assetresolver(_backend|_swap)'

  # Genericity proof — the permanent gate for the TextureResolver decode seam
  # (ADR-0024). Builds the two flag-gated decode backends — Backend A (stb_image,
  # vendored single header) and Backend B (wuffs, vendored single-file
  # amalgamation) — and runs the dual-backend swap-test: each lossless fixture
  # (PNG/BMP/GIF/TGA) decoded through stb AND wuffs must yield BYTE-EQUAL RGBA,
  # plus Failed-parity on corrupt input. Unlike the AssetResolver gate this needs
  # NO vcpkg, NO docker/minio, NO FetchContent — both decoders are vendored, so
  # the gate is a sub-minute apt + scoped build.
  #
  # Runs on every C++ PR (gated on `cpp`, not on a texture path filter):
  # texture decode parity is the closest thing the SDK has to a byte-exact
  # rendering guarantee, and the dual-backend comparison catches lossy decode
  # regressions a seam-path-gated run would silently miss if the change happened
  # outside the texture code. Only docs-only PRs skip it (they cannot regress
  # decode). Vendored + hermetic keeps the cost under ~2 min per PR.
  texture-swap:
    name: TextureResolver decode seam swap-test
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-texture-${{ github.sha }}
          restore-keys: ccache-texture-
      - name: Configure (stb + wuffs decode backends ON — both vendored)
        run: cmake -S . -B build -G Ninja -DX3D_CPP_BUILD_STB=ON -DX3D_CPP_BUILD_WUFFS=ON
      # Build only the texture test binary — not the whole project. The `cpp` job
      # covers the full build/ctest; this gate exists to prove the decode seam.
      - name: Build (TextureResolver swap-test target only)
        run: cmake --build build --target x3d_texture_tests
      - name: Swap-test (stb_image vs wuffs byte-equal decode parity)
        run: ctest --test-dir build --output-on-failure -R x3d_texture

  # Genericity proof — the permanent gate for the Audio seam (ADR-0026).
  # Builds the flag-gated miniaudio backend and runs the dual-backend swap-test:
  # headless render, no audio device required. No vcpkg or docker needed.
  audio-swap:
    name: Audio seam swap-test
    needs: changes
    if: needs.changes.outputs.audio == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-audio-${{ github.sha }}
          restore-keys: ccache-audio-
      - name: Configure (miniaudio backend ON — fetched, headless)
        run: cmake -S . -B build -G Ninja -DX3D_CPP_BUILD_MINIAUDIO=ON
      # Build only the audio swap-test binary — not the whole project. The `cpp`
      # job covers the full build/ctest; this gate exists to prove the audio seam.
      - name: Build (Audio swap-test target only)
        run: cmake --build build --target x3d_sound_swaptest
      - name: Swap-test (BuiltinDsp vs miniaudio, headless — no audio device)
        run: ctest --test-dir build --output-on-failure -R x3d_sound_swaptest

  # FontMetrics seam (ADR-0025): two independent backends — stb_truetype
  # (vendored single header) and FreeType (vcpkg) — must return BIT-IDENTICAL
  # advanceEm for the same glyph, plus Failed-parity on absent codepoints. stb is
  # vendored; FreeType comes from vcpkg with a binary cache so the cold build is
  # paid once. On every PR, so a future change that breaks metric parity fails.
  fontmetrics-swap:
    name: FontMetrics seam swap-test
    needs: changes
    if: needs.changes.outputs.fontmetrics == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache g++ mold curl zip unzip tar
      - name: Locate or bootstrap vcpkg
        run: |
          if [ -n "$VCPKG_INSTALLATION_ROOT" ] && [ -x "$VCPKG_INSTALLATION_ROOT/vcpkg" ]; then
            echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          else
            git clone --depth 1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
            echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          fi
      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          # Encode the manifest baseline in the key so it self-refreshes when the
          # baseline (or declared deps) change. Same key family as the
          # assetresolver job so a single archive cache serves both.
          key: vcpkg-${{ runner.os }}-manifest-01f602195983451bc83e72f4214af2cbc495aa94
          restore-keys: vcpkg-${{ runner.os }}-
      - name: "Install backend deps (vcpkg.json manifest: freetype)"
        # Manifest mode installs the declared port for this job — for the
        # fontmetrics swap, that's freetype.
        run: '"$VCPKG_ROOT/vcpkg" install --triplet x64-linux'
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-fontmetrics-${{ github.sha }}
          restore-keys: ccache-fontmetrics-
      - name: Configure (stbtt + FreeType backends ON)
        run: |
          cmake -S . -B build -G Ninja \
            -DX3D_CPP_BUILD_STBTT=ON -DX3D_CPP_BUILD_FREETYPE=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux
      # Build only the FontMetrics test binary — the `cpp` job covers the full build.
      - name: Build (FontMetrics swap-test target only)
        run: cmake --build build --target x3d_text_tests
      - name: Swap-test (stb_truetype vs FreeType exact-equal advanceEm)
        run: ctest --test-dir build --output-on-failure -R x3d_text

  # The out-of-SDK renderer CONSUMERS — examples/cpu_raster/ (headless CPU raster)
  # and examples/poc_renderer/ (OpenGL) — are OFF by default and built only via
  # `mise run cpuraster` / `mise run poc`, so the `cpp` gate never compiles them.
  # An SDK-wide refactor (e.g. ADR-0039's x3d::core / x3d::nodes namespace move)
  # silently rotted BOTH until someone ran an example by hand. This gate builds
  # both, runs their --headless probes, and exercises the real GL pipeline
  # headlessly under Xvfb + mesa software GL (llvmpipe) — the closest proof that
  # the renderer-agnostic extraction seam still works for an external consumer.
  # Runs on every C++ PR: the drift it catches comes from arbitrary public-API
  # changes, not one path-gated seam. Mirrors `mise run validate-examples` (both
  # call scripts/validate-examples.sh).
  examples-gate:
    name: Example consumers (cpu_raster + poc, headless GL)
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools + GLFW build deps + headless GL (Xvfb + mesa)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build ccache g++ mold \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            xvfb libgl1-mesa-dri mesa-utils libgl-dev
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-examples-${{ github.sha }}
          restore-keys: ccache-examples-
      - name: Build both examples + headless probes + Xvfb GL smoke
        run: scripts/validate-examples.sh

  # Heavy baseline matrix — pins oldest supported (GCC 11 / Clang 14) + current
  # compilers. Manual only (the 4× build is too heavy for every PR push).
  cpp-matrix:
    name: C++ baseline matrix (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gcc-11,        os: ubuntu-22.04, apt: g++-11,  cc: gcc-11,  cxx: g++-11 }
          - { name: clang-14,      os: ubuntu-22.04, apt: clang-14, cc: clang-14, cxx: clang++-14 }
          - { name: gcc-default,   os: ubuntu-latest, apt: g++,    cc: gcc,     cxx: g++ }
          - { name: clang-default, os: ubuntu-latest, apt: clang,  cc: clang,   cxx: clang++ }
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler + cmake + ninja + ccache
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ccache ${{ matrix.apt }}
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.name }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.name }}-
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        # WERROR=ON across the matrix too — the goal is identical gate, all
        # compilers should agree the codebase is warning-clean.
        run: cmake -S . -B build -G Ninja -DX3D_CPP_WERROR=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure -j "$(nproc)"
