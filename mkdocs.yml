site_name: x3d-cpp Knowledge Wiki
site_description: Canonical knowledge home for the x3d-cpp X3D domain runtime SDK.
site_author: Ben Sandbrook
repo_url: https://github.com/delta9000/x3d-cpp
docs_dir: docs/wiki

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.annotate
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Knowledge Map: knowledge-map.md
  - Coverage Manifest: coverage.md
  - Seam-Status Matrix: seam-status.md
  - Subsystems:
      - Generator & Bindings:
          - Generator Pipeline: subsystems/generator.md
          - Jinja2 Emit Templates: subsystems/templates.md
          - Generated Bindings: subsystems/generated-bindings.md
          - Reflection Layer: subsystems/reflection.md
      - Runtime Core:
          - Scene Graph: subsystems/scene-graph.md
          - Execution Context: subsystems/execution-context.md
          - Dirty Tracking, Transforms, and Bounds: subsystems/dirty-bounds-transform.md
          - Math Core: subsystems/math.md
      - Codecs & Parse:
          - Codec Writers: subsystems/codecs-writers.md
          - Canonical XML Writer: subsystems/canonical-xml.md
          - Parse Readers: subsystems/parse-readers.md
          - PROTO/EXTERNPROTO Expansion: subsystems/proto-expand.md
          - Inline Expansion: subsystems/inline-expand.md
      - Event / Behavior Runtime:
          - Event Cascade: subsystems/event-cascade.md
          - ROUTEs: subsystems/routes.md
          - Time System: subsystems/system-time.md
          - Interpolator System: subsystems/system-interpolators.md
          - Followers System: subsystems/system-followers.md
          - EventUtility System: subsystems/system-eventutility.md
          - View-Dependent System: subsystems/system-viewdependent.md
          - Viewpoint Binding System: subsystems/system-viewpointbind.md
          - Navigation System: subsystems/system-navigation.md
          - Pointing-Device Sensor System: subsystems/system-pointing.md
          - Key-Device Sensor System: subsystems/system-keydevice.md
          - Script / SAI Runtime: subsystems/system-script-sai.md
