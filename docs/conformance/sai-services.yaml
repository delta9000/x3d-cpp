    tests: [sai_evt_observer_mutation, sai_cxx_safe_destruction]
    binding_obligations: [CPP-4.3.1.2-CALLBACK-ROBUSTNESS]
    preserves: [INV-CXX-3, INV-EVT-3, INV-CONC-1, INV-EVT-5, INV-EVT-4]

  # Scene creation and parsing. Existing codecs are useful implementation
