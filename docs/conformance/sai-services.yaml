    preserves: [INV-EDIT-1, INV-EDIT-2, INV-EVT-1]
  - <<: *observer
    id: SVC-BROWSER-LISTENER
    clause: ISO/IEC 19775-2:2015, 6.3.20 registerBrowserInterest
    public_symbol: x3d::sai::experimental::execution_context::observe
