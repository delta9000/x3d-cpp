# ISO/IEC 19775-2 abstract-service inventory mapped to the intended modern C++
# surface. This is a convergence register, not a claim that ISO/IEC 19777-4's
# legacy class layout should be reproduced.
#
# support:
#   implemented  complete portable SAI behavior with executable coverage
#   partial      useful x3d-cpp behavior exists, but its surface or semantics
#                do not yet satisfy the complete abstract service
#   planned      no suitable public semantic service yet
#   unsupported  intentionally unavailable (must carry a reason in `errors`)
#
# A planned:* symbol or test is an explicit gap. YAML merge anchors keep the
# repeated ISO-wide policy visible here without obscuring per-service semantics.
schema_version: 1

defaults:
  query: &query
    profiles: [inspection]
    errors: optional absence is distinct from invalid context and implementation failure
    buffering: reads the latest committed state
    events: none
  browser_query: &browser_query
    profiles: [inspection, live, browser-adapter]
    errors: optional absence is distinct from invalid browser generation, unavailable capability, and adapter failure
    buffering: reads the latest committed browser generation
    events: none
  command: &command
    profiles: [authoring, live]
    errors: structured invalid-operation, invalid-context, and capability errors
    buffering: participates in the active mutation scope; otherwise commits at the documented service boundary
    events: effects are observable only after the commit boundary
  browser_command: &browser_command
    profiles: [authoring, live, browser-adapter]
    errors: structured invalid-operation, invalid-generation, capability, and adapter errors
    buffering: participates in browser update control; otherwise publishes at the service boundary
    events: world and field effects become observable at the browser publication boundary
  observer: &observer
    profiles: [inspection, live, browser-adapter]
    errors: invalid source, stale generation, and dispatcher failure are distinct
    buffering: registration and cancellation are immediate; delivery observes committed state only
    events: callbacks are ordered by causal publication and held by a cancellable RAII subscription
  console: &console
    profiles: [live, browser-adapter]
    errors: adapter output failure is reported without mutating scene state
    buffering: output is forwarded immediately according to host console policy
    events: none
  async: &async
    profiles: [live, browser-adapter]
    errors: completion distinguishes success, cancellation, timeout, invalid input, and transport or decode failure
    buffering: completion publishes one coherent scene or capability result
    events: completion is delivered through an explicit dispatcher with cancellable subscription lifetime

services:
  # Browser discovery, lifecycle, and world control.
  - <<: *browser_query
    id: SVC-BROWSER-NAME
    clause: ISO/IEC 19775-2:2015, 6.3.2 getName
    public_symbol: x3d::runtime::SaiContext::getName
    support: partial
    tests: [x3d_sai_context]
    binding_obligations: [CPP-4.3.2.2-SESSION-EQUIVALENCE]
    preserves: [INV-CXX-2, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-VERSION
    clause: ISO/IEC 19775-2:2015, 6.3.3 getVersion
    public_symbol: x3d::runtime::SaiContext::getVersion
    support: partial
    tests: [x3d_sai_context]
    preserves: [INV-CXX-2, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-CURRENT-TIME
    clause: ISO/IEC 19777-4:2015, Browser::currentTime binding utility
    public_symbol: x3d::runtime::SaiContext::currentTime
    support: partial
    tests: [x3d_sai_context]
    preserves: [INV-EVT-1, INV-PORT-1]
  - <<: *browser_query
