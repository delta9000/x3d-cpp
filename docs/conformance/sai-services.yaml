    tests: [x3d_sai_context]
    preserves: [INV-CXX-2, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-DESCRIPTION-READ
    clause: ISO/IEC 19777-4:2015, Browser description binding utility
    public_symbol: planned:x3d::sai::browser::description
    support: planned
    tests: [planned:sai_browser_description_read]
    preserves: [INV-LIFE-1, INV-PORT-1]
  - <<: *browser_command
    id: SVC-BROWSER-DESCRIPTION-WRITE
    clause: ISO/IEC 19775-2:2015, 6.3.15 setDescription
    public_symbol: planned:x3d::sai::browser::set_description
    support: planned
    tests: [planned:sai_browser_description_write]
    preserves: [INV-EDIT-1, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-SUPPORTED-PROFILES
    clause: ISO/IEC 19775-2:2015, 6.3.6 getSupportedProfiles
    public_symbol: planned:x3d::sai::browser::supported_profiles
    support: planned
    tests: [planned:sai_browser_supported_profiles]
    preserves: [INV-CAP-1, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-SUPPORTED-COMPONENTS
    clause: ISO/IEC 19775-2:2015, 6.3.8 getSupportedComponents
