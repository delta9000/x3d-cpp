    public_symbol: x3d::sai::experimental::browser::replace_world
    support: partial
    tests: [sai_life_stale_handle]
    preserves: [INV-LIFE-1, INV-EDIT-1, INV-EDIT-3]
  - <<: *async
    id: SVC-BROWSER-LOAD-URL
    clause: ISO/IEC 19775-2:2015, 6.3.14 loadURL
    public_symbol: x3d::sai::experimental::browser::begin_load
    support: partial
    tests: [sai_evt_stale_async]
    preserves: [INV-LIFE-1, INV-EDIT-3, INV-EVT-5]
  - <<: *browser_command
    id: SVC-BROWSER-BEGIN-UPDATE
    clause: ISO/IEC 19775-2:2015, 6.3.19 updateControl (begin)
    public_symbol: x3d::sai::experimental::execution_context::edit
    support: partial
    tests: [sai_edit_failure_nonmutation]
    preserves: [INV-EDIT-1, INV-EDIT-4, INV-CXX-3]
  - <<: *browser_command
