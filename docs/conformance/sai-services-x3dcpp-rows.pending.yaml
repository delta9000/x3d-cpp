# PENDING: x3d-cpp's side of the SAI service register.
#
# Extracted 2026-07-19 when the experimental SAI semantic kernel moved to the
# x3d-sai sister repository (see ADR-0047). sai-services.yaml there was a
# cross-implementation register: of its 65 services, these 29 are implemented
# by x3d-cpp (x3d::runtime::SaiContext, x3d::codec) rather than by the kernel,
# and their `tests:` entries name x3d-cpp CTests.
#
# This file is NOT yet a working register. It is the rows only: the `<<: *anchor`
# merge keys below refer to a `defaults:` block that stayed with the kernel repo,
# so this will not parse standalone. Turning it into x3d-cpp's own register
# needs a `schema_version`, a `defaults:` block defining those anchors, and a
# validator entry point. That is tracked work, not migration.
#
# Anchors referenced below: see x3d-sai docs/conformance/sai-services.yaml.
  # Browser discovery, lifecycle, and world control.
  - <<: *browser_query
    id: SVC-BROWSER-NAME
    clause: ISO/IEC 19775-2:2015, 6.3.2 getName
    public_symbol: x3d::runtime::SaiContext::getName
    support: partial
    tests: [x3d_sai_context]
    binding_obligations: [CPP-4.3.2.2-SESSION-EQUIVALENCE]
    preserves: [INV-CXX-2, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-VERSION
    clause: ISO/IEC 19775-2:2015, 6.3.3 getVersion
    public_symbol: x3d::runtime::SaiContext::getVersion
    support: partial
    tests: [x3d_sai_context]
    preserves: [INV-CXX-2, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-CURRENT-TIME
    clause: ISO/IEC 19777-4:2015, Browser::currentTime binding utility
    public_symbol: x3d::runtime::SaiContext::currentTime
    support: partial
    tests: [x3d_sai_context]
    preserves: [INV-EVT-1, INV-PORT-1]
  - <<: *browser_query
    id: SVC-BROWSER-FRAME-RATE
    clause: ISO/IEC 19775-2:2015, 6.3.5 getCurrentFrameRate
    public_symbol: x3d::runtime::SaiContext::currentFrameRate
    support: partial
    tests: [x3d_sai_context]
    preserves: [INV-CXX-2, INV-PORT-1]
  - <<: *console
    id: SVC-BROWSER-PRINT
    clause: ISO/IEC 19775-2:2015, 6.3.24 print/println
    public_symbol: x3d::runtime::SaiContext::print
    support: partial
    tests: [x3d_sai_context]
    preserves: [INV-PORT-1, INV-VAL-2]
  - <<: *command
    id: SVC-SCENE-CREATE-FROM-STRING
    clause: ISO/IEC 19775-2:2015, 6.3.16 createX3DFromString
    public_symbol: x3d::codec::parseDocument
    support: partial
    tests: [x3d_parse_tests]
    preserves: [INV-ID-2, INV-EDIT-3, INV-VAL-1, INV-VAL-2, INV-RT-2]
  - <<: *async
    id: SVC-SCENE-CREATE-FROM-URL
    clause: ISO/IEC 19775-2:2015, 6.3.18 createX3DFromURL
    public_symbol: x3d::runtime::extract::AssetResolver
    support: partial
    tests: [x3d_assetresolver_swap]
    binding_obligations: [CPP-4.3.4-RELATIVE-URLS]
    preserves: [INV-EDIT-3, INV-LIFE-1, INV-EVT-5]

