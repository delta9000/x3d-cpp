# Independent completeness oracle for the abstract SAI service inventory.
# Names and clauses are transcribed from the official ISO/IEC 19775-2:2015
# (X3D 3.3) Clause 6 table of contents. Do not derive this list from x3d-cpp.
schema_version: 1
standard: ISO/IEC 19775-2:2015
source_url: https://www.web3d.org/documents/specifications/19775-2/V3.3/Part02/services.html
reviewed: "2026-07-18"

# Language-binding-only semantics are tracked independently from the abstract
# service clauses below. This audit deliberately fails closed: `complete` may
# be set only after every normative clause, table, and base interface in Part 4
# has been checked, not merely after these initially identified obligations are
# implemented.
cpp_binding:
  standard: ISO/IEC 19777-4 C++ language binding
  source_url: https://www.web3d.org/specifications/ISO-IEC19777/ISO-IEC19777-4v3.3-CD/Part04/concepts.html
  reviewed: "2026-07-18"
  audit_status: incomplete
  obligations:
    CPP-4.3.1.2-CALLBACK-ROBUSTNESS: User exceptions outside Script initialization do not terminate browser execution.
    CPP-4.3.2.2-SESSION-EQUIVALENCE: Browser services have the same semantics regardless of how the browser reference was obtained.
    CPP-4.3.3.1-NODE-USER-DATA: User data follows semantic node identity and is visible through every reference to that node.
    CPP-4.3.3.1-FIELD-USER-DATA: User data follows semantic field identity and survives disposal of an individual external reference while the field remains live.
    CPP-4.3.4-RELATIVE-URLS: Relative URL resolution has an explicit application or remote-session base policy.
    CPP-4.3.5.1-NULL-NODES: A null C++ node handle maps to X3D NULL for SFNode reads and writes.
    CPP-4.3.5.2-EXTERNAL-MF-EVENTS: External MF edits aggregate under update control and otherwise publish one event per write.
    CPP-4.3.5.3-MFNODE-NULL-ORDER: MFNode preserves null elements and their original positions.
    CPP-4.3.5.4-MFIELD-ARRAYS: Empty MF values are size-zero ranges and null is not accepted as an array value.
    CPP-4.3.5.5-SET1VALUE: Indexed MF writes obey the host-specific aggregation and last-write rules.
    CPP-4.3.6-DISPOSAL: Explicit disposal invalidates the disposed entity handle and later access fails predictably.
    CPP-A.4.4-FIELD-DEFINITION: Field definitions expose stable name, access, numeric type, and type-name metadata.
    CPP-A.4.5-FIELD-CAPABILITY: Field readability and writability reflect the current lifecycle phase.
    CPP-A.4.5-FIELD-OBSERVATION: Field subscriptions can be added and removed without corrupting event delivery.
    CPP-A.4.6-MFIELD-EDITING: Multi-fields expose size, clear, and indexed removal with defined bounds behavior.
    CPP-A.4.48-MFNODE-EDITING: MFNode exposes whole-range, indexed, append, and insert operations without losing node identity.

