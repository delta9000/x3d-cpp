  note: "inertia/centerOfMass shipped 3a9595c: non-identity inertia → authored 3x3 tensor; non-zero centerOfMass → COM-offset shape wrap; pose readback uses the body origin (GetPosition) so RigidBody.position tracks the authored reference point. Verified by the quadcopter sim (authored inertia governs roll, differs from shape-derived) + a COM-orbit test. Still derived/ignored: massDensityModel (alt mass shape), finiteRotation (integrator option)."
