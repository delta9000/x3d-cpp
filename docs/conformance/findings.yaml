- id: ENV-01
  nodes: [TransformSensor]
  clause: "22.4.2"
  severity: critical
  status: closed
  summary: TransformSensor has no System — node inert (no isActive/position/orientation_changed).
  resolution: "Fixed — ViewDependentSystem now enrolls TransformSensor in attach() and dispatches an updateTransform() branch each tick. Tracks targetObject's world AABB against a sensor-local box (center + size), fires isActive/enterTime/exitTime on boundary transitions, and while inside emits position_changed / orientation_changed relative to center in the sensor's local frame. ENV-04 change-gating (emit only on actual change) + ENV-07 disable-deactivates mirror ProximitySensor. 6 new tests in view_dependent_test.cpp (Enter, Exit, PositionChanged, ChangeGate, DisableFiresExit, NullTarget). Also added TransformSystem::worldTransformAny(n) + X3DExecutionContext passthrough + worldBounds routed through it — required so targetObject reachable via both a non-Transform reference AND a Transform ancestor still resolves through the Transform ancestor (the scene-graph walk-from-roots picks the wrong path). worldTransformAny reads localMatrix() live each call (mid-tick setF on translation reflects immediately, unlike the cached worldTransform which only refreshes via propagate() at tick end)."
