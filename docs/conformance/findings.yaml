# ── Behavioral-family deferrals (explain the inert nodes) ───────────────────
# These cover whole un-implemented behavioral components so each inert node has a
# tracked reason rather than looking like an unexplained hole.
# ── §16 Sound audit (2026-06-21) — supersedes the blanket CONF-SOUND ────────
# The Sound seam SHIPPED 2026-06-20 (merge efb584f): SoundSystem drives an
# engine-agnostic AudioBackend over the §16 `children` audio graph. The shipped
# scope is the synthesis chain OscillatorSource -> BiquadFilter -> Gain ->
# AudioDestination (frequency/detune/gain/qualityFactor read + route-animated
# each tick; BiquadFilter.type read once at construction but not pushed per-tick
# — the seam's Param enum has no FilterType entry). Audited node-by-node against
# sound.md §16: the chain works but ignores the per-node enabled flag + the
# X3DTimeDependentNode lifecycle, and the rest of the component (spatialization,
# other sources/processing, channels) is not built. Findings SND-1..SND-9 below
# replace CONF-SOUND.
- id: SND-1
  nodes: [OscillatorSource, Gain, BiquadFilter]
  interfaces: [X3DSoundSourceNode, X3DSoundProcessingNode]
  component: Sound
  clause: "16.4.12, 16.4.15, 16.4.4"
  severity: major
  status: open
  summary: enabled field ignored on every wired sound node — a disabled Oscillator/Gain/BiquadFilter still synthesizes/processes.
  note: SoundSystem buildChild/pushParams never read getEnabled(); §16 defaults enabled TRUE but enabled=FALSE shall disable the node. Actionable now (no seam) — gate createNode/setParam (and bypass vs mute per §16 node semantics).
- id: SND-2
  nodes: [OscillatorSource, Gain, BiquadFilter]
  interfaces: [X3DTimeDependentNode]
  component: Sound
  clause: "8.2.4.1, 16.4.15"
  severity: major
  status: open
  summary: X3DTimeDependentNode lifecycle ignored — sound nodes emit unconditionally; startTime/stopTime/pauseTime/resumeTime/loop not honored and isActive/isPaused/elapsedTime never emitted.
  note: SoundSystem has no activation clock — the oscillator plays from t=0. Gating a synthesized source on startTime/stopTime is doable now (no media seam); emitting isActive/isPaused as routed events needs an event-cascade hookup. Mirrors TimeSensor (TDN-*); relates to TDN-5 for media sources.
- id: SND-3
  nodes: [Sound, SpatialSound, ListenerPointSource]
  component: Sound
  clause: "16.4.17, 16.4.16, 16.4.13"
  severity: major
  status: deferred
  summary: "Spatialization PARTIAL — SpatialSound/ListenerPointSource equal-power pan + three DistanceModel modes proven via swap-test (ADR-0026); §16 Sound ellipsoid attenuation (minFront/maxFront/minBack/maxBack), HRTF, and Doppler still deferred."
  note: "SoundSystem wires SpatialSound+ListenerPointSource through a Panner node; equal-power pan (BuiltinDsp) and ma_spatializer (MiniaudioBackend) agree on structural spatial invariants (ear-sign, symmetry, monotonic distance falloff over Linear/Inverse/Exponential). NOT proven: the §16 Sound ellipsoid (seam carries no ellipsoid params — SpatialSound does not fully map to Panner), HRTF (no second reference HRTF renderer), Doppler. Those remain deferred to v2. See ADR-0026 scope-honesty section."
- id: SND-4
  nodes: [AudioClip, BufferAudioSource, StreamAudioSource, MicrophoneSource]
  interfaces: [X3DSoundSourceNode]
  component: Sound
  clause: "16.4.2, 16.4.5, 16.4.20, 16.4.14"
  severity: major
  status: deferred
  summary: Audio source breadth — only OscillatorSource is built; AudioClip/BufferAudioSource/StreamAudioSource/MicrophoneSource subtrees are skipped (buildChild returns early).
  note: Blocked on an audio decode/capture + duration_changed seam (file/buffer/stream/device IO). Drives TDN-5 (AudioClip time-lifecycle). Backend extension = add NodeKinds + the IO seam.
- id: SND-5
  nodes: [Analyser, Convolver, Delay, DynamicsCompressor, WaveShaper]
  interfaces: [X3DSoundProcessingNode]
  component: Sound
  clause: "16.4.1, 16.4.6, 16.4.7, 16.4.9, 16.4.21"
  severity: minor
  status: deferred
  summary: Sound-processing breadth — only Gain + BiquadFilter are built; Analyser/Convolver/Delay/DynamicsCompressor/WaveShaper subtrees are skipped.
  note: Each is a clean AudioBackend extension point (add a NodeKind + DSP in the backend .cpp). No new seam needed — deferred on demand (no consumer yet).
- id: SND-6
  nodes: [ChannelMerger, ChannelSelector, ChannelSplitter]
  interfaces: [X3DSoundChannelNode]
  component: Sound
  clause: "16.4.10, 16.4.11, 16.4.8"
  severity: minor
  status: deferred
  summary: "Channels + multi-channel PARTIALLY UNBLOCKED — stereo render path (renderStereo) landed (ADR-0026); ChannelMerger/Selector/Splitter still not built; channelCount/channelCountMode/channelInterpretation still ignored."
  note: "The AudioBackend now has renderStereo() proven via the swap-test (both backends render stereo output for Panner nodes). The stereo path is the seam prerequisite for multi-channel; the ChannelMerger/Selector/Splitter nodes and channel-aware routing still require dedicated NodeKinds and a channel-count-aware buffer contract. Deferred."
- id: SND-7
  nodes: [AudioDestination, StreamAudioDestination]
  component: Sound
  clause: "16.4.3, 16.4.19"
  severity: minor
  status: open
  summary: AudioDestination.gain ignored by render and maxChannelCount is read but unused (mono); StreamAudioDestination not built.
  note: SoundSystem reads maxChannelCount into params but render() is mono and never applies the destination gain (§16.4.3). The gain pass-through is a small fix (no seam); multi-channel + stream output is deferred (SND-6).
- id: SND-8
  nodes: [Gain, BiquadFilter]
  interfaces: [X3DSoundProcessingNode]
  component: Sound
  clause: "16.4.12, 16.4.4"
  severity: minor
  status: deferred
  summary: tailTime ignored on processing nodes — a stopped Gain/BiquadFilter does not continue emitting for tailTime seconds.
  note: Tied to the missing activation lifecycle (SND-2); the backend renders steady-state with no stop edge to tail from. Resolve alongside SND-2.
- id: SND-9
  nodes: [OscillatorSource, PeriodicWave]
  component: Sound
  clause: "16.4.15, 16.4.18"
  severity: minor
  status: deferred
  summary: periodicWave ignored — OscillatorSource is always Sine; a referenced PeriodicWave (custom waveform via real/imag DFT terms) is not realized.
  note: Spec-correct default (periodicWave NULL = sine), so not a bug — but custom waveforms are unsupported. The seam already carries a Waveform enum (Sine/Square/Sawtooth/Triangle); arbitrary PeriodicWave needs a DFT-coefficient param. Deferred.
