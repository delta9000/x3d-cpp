# ── §37 RigidBodyPhysics — a simulation runtime SHIPS (seam + flag-gated Jolt:
#    Box/Sphere, gravity, collision RESPONSE, Ball/SingleAxisHinge/Slider joints,
#    pose route-out). It is PARTIAL: the findings below enumerate every §37 node /
#    RigidBody / RigidBodyCollection field that is read-but-ignored or unsupported.
#    See docs/wiki/subsystems/physics.md "§37 field & node coverage" for the matrix.
- id: CONF-RBP
  component: RigidBodyPhysics
  nodes: [CollisionSensor, Contact, CollisionCollection, CollisionSpace]
  clause: "37"
  severity: major
  status: fixed
  commit: bde5134
  summary: "CollisionSensor reports collisions: contacts (Contact nodes), intersections, and isActive are emitted from the watched CollisionCollection's collidables (§37.4.4-.4.7)."
  note: "Read-only output bridge (the solver already resolves contacts; §37.4.5 forbids feeding them back). PhysicsBackend.drainContacts pull seam + Jolt ContactListener; ContactReporter builds Contact nodes (geometry from the engine, response fields from the CollisionCollection defaults) and emits over the cascade. Deterministic ordering via stable enrolment ordinals. Deferred refinements: one Contact per body-pair per frame (not per manifold point); space-vs-space broadphase grouping (folded into CONF-RBP-GEOM)."
- id: CONF-RBP-FORCES
  component: RigidBodyPhysics
  nodes: [RigidBody]
  clause: "37"
  severity: major
  status: fixed
  commit: 9560686
  summary: "RigidBody.forces/.torques are applied every frame (§37.4.10 continuous-force model) via the new seam method applyForce."
  note: "PhysicsSystem sums forces+torques and applies the resultant before each substep. TDD — zero-g body under 10 N reaches y=4.997 after 1 s (analytic 5)."
- id: CONF-RBP-GEOM
  component: RigidBodyPhysics
  nodes: [CollidableShape, CollidableOffset]
  clause: "37"
  severity: minor
  status: deferred
  summary: "Box/Sphere/Cylinder (exact) + Cone (analytic AABB) collidables are supported; non-analytic meshes (IndexedFaceSet etc.) still exclude the body. CollidableOffset is unhandled; only the first CollidableShape per body is used (no compound)."
  note: As of 68eb39b Cylinder/Cone enroll; the mesh exclusion is OBSERVABLE via droppedBodyCount() (was silent). Remaining closure = a mesh/convex-hull shape path + CollidableOffset transform + compound shapes.
- id: CONF-RBP-JOINTS
  component: RigidBodyPhysics
  nodes: [DoubleAxisHingeJoint, MotorJoint, UniversalJoint]
  clause: "37"
  severity: major
  status: deferred
  summary: "Compound joints are unsupported (only BallJoint/SingleAxisHingeJoint/SliderJoint map to constraints); DoubleAxisHingeJoint/MotorJoint/UniversalJoint are skipped with a note."
  note: The seam (ConstraintDesc + addConstraint) is extensible — add a Kind per joint. No motor drive on the hinge either.
- id: CONF-RBP-JOINT-OUT
  component: RigidBodyPhysics
  nodes: [BallJoint, SingleAxisHingeJoint, SliderJoint]
  clause: "37"
  severity: minor
  status: deferred
  summary: "Joint output events are never produced (angle/separation/*Rate/body*AnchorPoint *_changed), and joint sub-fields stopBounce/stopErrorCorrection are ignored."
  note: Constraints drive motion but report nothing back to the scene. Needs a per-tick joint-state readback mirroring the body pose readback.
- id: CONF-RBP-DAMP
  component: RigidBodyPhysics
  nodes: [RigidBody]
  clause: "37"
  severity: low
  status: deferred
  summary: "Sleeping/auto-disable thresholds are ignored: autoDisable/disableTime/disableLinearSpeed/disableAngularSpeed have no effect. (autoDamp damping IS now applied — 2e9d8f3.)"
  note: autoDamp + linear/angularDampingFactor ship (force = -factor·velocity, §37.4.10). The per-body sleep thresholds remain — Jolt's sleep thresholds are global PhysicsSettings, not per-body, so a faithful mapping needs more than a flag.
- id: CONF-RBP-HINGE-LIMITS
  component: RigidBodyPhysics
  nodes: [SingleAxisHingeJoint]
  clause: "37"
  severity: minor
  status: fixed
  summary: "SingleAxisHingeJoint minAngle/maxAngle are honored with the correct sign. §37 limits are measured from the initial pose (valid range minAngle<=0<=maxAngle, <=pi each way) — exactly Jolt's hinge convention. Spec-valid ranges, including asymmetric ones, are honored; out-of-domain/malformed limits are clamped to the valid domain + warned."
  note: "Jolt's hinge angle is the NEGATIVE of the body's rotation about the axis, so the authored limits are negated before being handed to Jolt ([lo,hi] -> [-hi,-lo]); a TDD asymmetric-limit test caught a latent sign bug that symmetric ranges (the default -pi..pi and the locked 0,0) had hidden. A zero-width (locked) range is widened by a 1e-4 gap (Jolt asserts on min==max). Out-of-domain input (initial pose outside the limits, |angle|>pi) is malformed per §37 and clamped + warned. stopBounce / stopErrorCorrection (limit softness/overshoot) remain deferred under CONF-RBP-SOLVER."
