# --- Geometry tessellation + normals (§11 / §13) ---
- id: EXT-001
  nodes: [ElevationGrid, GeoElevationGrid]
  component: Geometry3D
  clause: "13.3.4, 25.3.2"
  severity: major
  status: open
  summary: ElevationGrid/GeoElevationGrid drop authored color + normal nodes (colorPerVertex/normalPerVertex ignored) — only auto flat normals, no vertex colors.
  note: The grid handlers never call buildAttrs(); wire color/normal/colorPerVertex/normalPerVertex (per-vertex i+j*xDim, per-quad i+j*(xDim-1)).
- id: EXT-002
  nodes: [TriangleFanSet, TriangleStripSet, IndexedTriangleFanSet, IndexedTriangleStripSet]
  component: Rendering
  clause: "11.3.2, 11.4.13, 11.4.15"
  severity: major
  status: closed
  commit: fe4d730
  summary: With colorPerVertex/normalPerVertex=FALSE, fan/strip sets index color/normal per TRIANGLE (faceNo++ per triangle) instead of per fan/strip — wrong colors/normals when a fan/strip has >1 triangle.
  note: Increment faceNo per fan/strip primitive (per fanCount/stripCount entry, per -1 run for indexed), not per emitted triangle.
- id: EXT-003
  nodes: [ElevationGrid, GeoElevationGrid]
  component: Geometry3D
  clause: "13.3.4"
  severity: major
  status: closed
  summary: ElevationGrid/GeoElevationGrid cells were wound backwards — with the default ccw=TRUE the generated face normals pointed −Y (down), so the surface was lit from below and, under a consumer's default solid=TRUE back-face cull, the whole terrain vanished when viewed from above.
  note: "emitHeightGrid() (the shared height-grid emitter for both ElevationGrid and GeoElevationGrid) split each cell (v00,v10,v11)+(v00,v11,v01), which is CW from the +Y side → faceNormal −Y. Reversed to (v00,v11,v10)+(v00,v01,v11) so the surface is CCW/front-facing from above and normals point +Y per §13.3.4. latticeIndex/creaseAngle smoothing key on the source lattice id, so they are order-independent. Surfaced by the Kelp Forest RockFloor (an ElevationGrid) rendering as scattered fragments vs X_ITE. Regression: mesh_builder_elevationgrid_winding_test.cpp (flat grid, default ccw → every normal +Y). (2026-06-25)"

