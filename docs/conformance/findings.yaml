# X3D behavioral-conformance findings — THE SOURCE OF TRUTH for judgments.
#
# Edit ONLY this file to raise, update, or close a behavioral gap. The code FACTS
# (exists / extracts / wired / component / profile) are auto-derived by
# scripts/conformance_view.py; the JUDGMENTS (does it behave per ISO prose?
# severity? status?) live here. After editing, run `mise run conformance`.
#
# schema (per finding):
#   id:         stable id (campaign convention, e.g. TDN-3, INTERP-01, CONF-SOUND)
#   interfaces: [behavioral abstract interfaces this covers]  (tags all implementers)
#   nodes:      [specific concrete nodes]   (at least one of nodes/interfaces required)
#   component:  optional explicit component (else inferred from nodes)
#   clause:     ISO 19775-1 section(s)
#   severity:   critical | major | minor | low
#   status:     open | deferred | fixed | closed
#   wave:       optional campaign wave number
#   commit:     optional commit (for fixed/closed)
#   summary:    one line
#   note:       optional closure plan / deferral reason
#
# status semantics: open = actionable now; deferred = blocked on a missing
# subsystem/seam/design; fixed/closed = done (kept for history + closed-rate).

